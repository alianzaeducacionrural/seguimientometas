<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Redirigiendo…</title>
    <script type="text/javascript">
      // GitHub Pages sirve archivos estáticos: no sabe nada de las rutas de
      // React Router, así que una entrada directa a /lider?token=... o
      // /admin/convenios/3 (como cualquier magic-link) devuelve 404. Este
      // truco (spa-github-pages, rafgraph) codifica el path real en la
      // query string y redirige a index.html, que lo decodifica en
      // main.jsx antes de montar la app.
      var pathSegmentsToKeep = 1; // "/seguimientometas"
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
